<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
</head>

<body>

    <div id="mainContainer">

        <dialog class="modal" id="projectModal">
            <form action="" id="projectForm">
                <input type="text" placeholder="enter title" id="projectTitle" required>
                <button id="closeProjectModalBtn">close</button>
                <button id="submitProjectBtn">submit</button>
            </form>
        </dialog>

        <nav id="navbar"><button id="addProjectBtn">Add Project</button></nav>

        <div id="projectContainer"></div>

        <div id="todoContainer"></div>

    </div>

    <script type="module" src="dom.js"></script>
</body>

</html>
