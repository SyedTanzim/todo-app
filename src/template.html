<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');
    </style>
    <title>Todo App</title>
</head>

<body>

    <dialog class="modal" id="projectModal">
        <form action="" id="projectForm">
            <label for="projectTitle">Project Title*</label>
            <input type="text" placeholder="" id="projectTitle" required>
            <div id="projectFormBtnContainer"></div>
        </form>
    </dialog>

    <dialog class="modal" id="todoModal">
        <form action="" id="todoForm">
            <label for="todoTitle">Todo Title*</label>
            <input id="todoTitle" type="text" placeholder="" required>

            <label for="todoDescription">Todo Description</label>
            <input id="todoDescription" type="text" placeholder="" required>

            <label for="todoPriority">Todo Priority</label>
            <select name="priority" id="todoPriority">
                <option value="LOW">LOW</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="HIGH">HIGH</option>
            </select>

            <label for="todoDate">Todo Date</label>
            <input id="todoDate" type="date" placeholder="" required>

            <div id="todoFormBtnContainer"></div>
        </form>
    </dialog>

    <nav id="navBar">
        <h1 id="projectHeading">Project List</h1>
        <h1 id="todoHeading">Todo List</h1>
        <div id="navBtnContainer"></div>
    </nav>

    <div id="mainContainer">
        <div id="projectContainer"></div>
        <div id="todoContainer"></div>
    </div>

    <script type="module" src="index.js"></script>
</body>

</html>
