<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
</head>

<body>

    <dialog class="modal" id="projectModal">
        <form action="" id="projectForm">
            <input type="text" placeholder="enter title" id="projectTitle" required>
        </form>
    </dialog>

    <dialog class="modal" id="todoModal">
        <form action="" id="todoForm">
            <input id="todoTitle" type="text" placeholder="enter title" required>
            <input id="todoDescription" type="text" placeholder="enter description" required>
            <input id="todoDate" type="date" placeholder="enter date" required>

            <label for="todoPriority">select priority level</label>
            <select name="priority" id="todoPriority">
                <option value="low">low</option>
                <option value="med">med</option>
                <option value="high">high</option>
            </select>
        </form>
    </dialog>

    <nav id="navbar"></nav>

    <div id="mainContainer">
        <div id="projectContainer"></div>
        <div id="todoContainer"></div>
    </div>

    <script type="module" src="index.js"></script>
</body>

</html>
